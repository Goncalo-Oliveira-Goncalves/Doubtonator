<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Bottom Navigation — Doubtonator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#fafffd; --surface:#d6d5d7; --primary:#9fd356; --text:#342e37; --text-sec:#5d585f; --muted:#aeabaf; }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body { background:var(--bg); min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:48px; padding:48px 24px; font-family:'Fredoka One',sans-serif; color:var(--text); }
    .eyebrow { font-family:'Nunito',sans-serif; font-weight:800; font-size:11px; letter-spacing:2.5px; text-transform:uppercase; color:var(--primary); opacity:.8; }
    .header { text-align:center; display:flex; flex-direction:column; gap:5px; }
    .header h1 { font-size:24px; }
    .header p  { font-family:'Nunito',sans-serif; font-size:13px; color:var(--text-sec); }
    .phone { width:390px; background:var(--bg); border-radius:44px; overflow:hidden; border:1px solid rgba(52,46,55,.16); box-shadow:0 18px 40px rgba(0,0,0,.16); }
    .screen { height:440px; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:12px; position:relative; overflow:hidden; }
    .screen::before { content:''; position:absolute; inset:0; background-image:radial-gradient(circle,rgba(52,46,55,.1) 1px,transparent 1px); background-size:22px 22px; }
    .screen-lbl { font-size:28px; }
    .screen-sub { font-family:'Nunito',sans-serif; font-size:13px; color:var(--text-sec); }
    /* Nav */
    .bottom-nav { height:72px; background:#ffffff; border-top:1px solid rgba(52,46,55,.14); display:flex; align-items:center; padding:0 8px; gap:4px; }
    .nav-item { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:0; height:56px; border-radius:14px; cursor:pointer; transition:background .18s; border:1.5px solid transparent; -webkit-tap-highlight-color:transparent; }
    .nav-item:not(.active):hover { background:rgba(52,46,55,.06); }
    .nav-item.active { background:var(--bg); border-color:rgba(52,46,55,.16); }
    .nav-icon { width:22px; height:22px; display:flex; align-items:center; justify-content:center; transition:transform .18s; }
    .nav-item.active .nav-icon { transform:scale(1.08); }
    .nav-label { display:none; }
    /* SVG theming */
    .nav-icon img { width:22px; height:22px; object-fit:contain; }
    .hint { font-family:'Nunito',sans-serif; font-size:12px; font-weight:600; color:var(--text-sec); opacity:.45; }
  </style>
</head>
<body>
<div class="header">
  <span class="eyebrow">Component · Navigation</span>
  <h1>Bottom Navigation Bar</h1>
  <p>Tap tabs to switch · active = rounded container + primary colour + outline</p>
</div>

<div class="phone">
  <div class="screen">
    <span class="screen-lbl" id="lbl">Quests</span>
    <span class="screen-sub" id="sub">Your daily &amp; weekly tasks</span>
  </div>
  <nav class="bottom-nav">

    <div class="nav-item" data-tab="Home" data-sub="Canvas &amp; agents" onclick="pick(this)">
      <div class="nav-icon"><img src="../assets/bottom-menu/home-tab-map.svg" alt="Home"></div>
      <span class="nav-label">Home</span>
    </div>

    <div class="nav-item" data-tab="Calendar" data-sub="Events &amp; schedule" onclick="pick(this)">
      <div class="nav-icon"><img src="../assets/bottom-menu/calendar-tab-calendar.svg" alt="Calendar"></div>
      <span class="nav-label">Calendar</span>
    </div>

    <div class="nav-item" data-tab="Clan" data-sub="Community &amp; tournaments" onclick="pick(this)">
      <div class="nav-icon"><img src="../assets/badges/simplified/simplified-gold-badge.svg" alt="Clan"></div>
      <span class="nav-label">Clan</span>
    </div>

    <div class="nav-item active" data-tab="Quests" data-sub="Your daily &amp; weekly tasks" onclick="pick(this)">
      <div class="nav-icon"><img src="../assets/bottom-menu/quests-tab-treasure-chest.svg" alt="Quests"></div>
      <span class="nav-label">Quests</span>
    </div>

    <div class="nav-item" data-tab="Profile" data-sub="Achievements &amp; stats" onclick="pick(this)">
      <div class="nav-icon"><img src="../assets/bottom-menu/avatar-tab-avatar.svg" alt="Profile"></div>
      <span class="nav-label">Profile</span>
    </div>

  </nav>
</div>
<span class="hint">Home / Calendar / Clan / Quests / Profile</span>
<script>
  function pick(el){
    document.querySelectorAll('.nav-item').forEach(i=>i.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('lbl').textContent=el.dataset.tab;
    document.getElementById('sub').textContent=el.dataset.sub;
  }
</script>
</body>
</html>
