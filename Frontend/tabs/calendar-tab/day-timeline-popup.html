<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Day Timeline Popup</title><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;800&display=swap" rel="stylesheet"><style>:root{--bg:#342e37;--surface:#3e3842;--text:#fafffd;--text-sec:#858287;--border:rgba(255,255,255,.08)}*{box-sizing:border-box}body{margin:0;background:#1e1a21;min-height:100vh;display:grid;place-items:center;font-family:'Fredoka One',sans-serif;color:var(--text)}.popup{width:min(390px,95vw);background:var(--bg);border:1px solid var(--border);border-radius:24px;padding:16px}.top{display:flex;gap:12px;align-items:center}.day{width:72px;height:72px;border-radius:50%;background:var(--surface);display:grid;place-items:center;font-size:30px}.m{font-size:24px}.sub{font:800 11px 'Nunito',sans-serif;color:var(--text-sec);letter-spacing:1px}.list{margin-top:12px;display:flex;flex-direction:column;gap:8px}.item{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px}.it{font:700 11px 'Nunito',sans-serif;color:var(--text-sec)}.in{font-size:13px}</style></head><body><div class="popup"><div class="top"><div class="day">7</div><div><div class="m">April</div><div class="sub">MON | 2026</div></div></div><div class="list"><div class="item"><div class="in">Tournament closes</div><div class="it">23:59 - Tournament</div></div><div class="item"><div class="in">Auto score freeze</div><div class="it">00:00 - System</div></div></div></div></body></html>
