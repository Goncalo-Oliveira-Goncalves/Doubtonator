<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Rewards Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#fafffd; --surface:#d6d5d7; --primary:#9fd356; --text:#342e37; --text-sec:#5d585f; --muted:#aeabaf; --line:rgba(52,46,55,.16); }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--bg); color:var(--text); min-height:100vh; display:grid; place-items:center; font-family:'Nunito',sans-serif; padding:20px; }
    .phone { width:390px; min-height:760px; border:1px solid var(--line); border-radius:32px; background:var(--bg); overflow:hidden; box-shadow:0 18px 40px rgba(0,0,0,.15); }
    .top { padding:18px 18px 8px; display:flex; align-items:center; justify-content:space-between; }
    .title { font:400 20px 'Fredoka One',sans-serif; }
    .chip { border:1px solid var(--line); border-radius:14px; padding:8px 12px; display:flex; align-items:center; gap:6px; font-weight:800; color:#ffb800; }
    .content { padding:8px 18px 18px; display:grid; gap:12px; }
    .card { border:1px solid var(--line); border-radius:18px; background:#fff; padding:14px; }
    .kicker { font-weight:800; font-size:11px; letter-spacing:1.5px; text-transform:uppercase; color:var(--text-sec); opacity:.7; }
    .rec { margin-top:8px; display:flex; justify-content:space-between; align-items:center; gap:10px; }
    .rec h3 { font:400 18px 'Fredoka One',sans-serif; }
    .btn { border:none; background:var(--primary); color:#fff; font-weight:800; border-radius:12px; padding:10px 12px; cursor:pointer; }
    .btn.sec { background:#fff; border:1px solid var(--line); color:var(--text); }
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:8px; }
    .item { border:1px solid var(--line); border-radius:14px; padding:10px; background:#fff; }
    .price { font-weight:800; color:#ffb800; margin-top:6px; }
    .row { display:flex; gap:8px; margin-top:8px; }
    .toast { position:fixed; left:50%; bottom:30px; transform:translateX(-50%); background:#342e37; color:#fafffd; padding:10px 16px; border-radius:12px; font:800 12px 'Nunito',sans-serif; opacity:0; transition:opacity .2s; }
    .toast.show { opacity:1; }
  </style>
</head>
<body>
  <main class="phone">
    <header class="top">
      <a class="btn sec" href="../../home-wireframe.html">Back</a>
      <h1 class="title">Rewards Store</h1>
      <div class="chip"><img src="../../../../assets/spark-2d.svg" width="14" height="14" alt="">248</div>
    </header>
    <section class="content">
      <article class="card">
        <p class="kicker">Recommended</p>
        <div class="rec">
          <div>
            <h3>Neon Hex Avatar Ring</h3>
            <p>Matches your 60+ day streak tier.</p>
          </div>
          <button class="btn" id="quickBuyBtn">120</button>
        </div>
      </article>
      <article class="card">
        <div class="row">
          <a class="btn sec" href="rewards-store/catalog-popup.html">Open Catalog</a>
          <a class="btn sec" href="rewards-store/item-popup.html">Open Item</a>
        </div>
      </article>
      <article class="card">
        <p class="kicker">Catalog Preview</p>
        <div class="grid">
          <div class="item"><strong>Fire Trail</strong><p class="price">80 sparks</p></div>
          <div class="item"><strong>Node Skin</strong><p class="price">110 sparks</p></div>
          <div class="item"><strong>Spark Burst</strong><p class="price">65 sparks</p></div>
          <div class="item"><strong>Voice Pack</strong><p class="price">95 sparks</p></div>
        </div>
      </article>
    </section>
  </main>
  <div class="toast" id="toast">Demo purchase complete.</div>
  <script>
    const toast = document.getElementById('toast');
    document.getElementById('quickBuyBtn').addEventListener('click', () => {
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 1200);
    });
  </script>
</body>
</html>
