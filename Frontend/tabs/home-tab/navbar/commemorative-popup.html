<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Commemorative Popup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#fafffd; --primary:#9fd356; --text:#342e37; --text-sec:#5d585f; --line:rgba(52,46,55,.16); }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:rgba(52,46,55,.88); min-height:100vh; display:grid; place-items:center; font-family:'Nunito',sans-serif; color:var(--text); }
    .popup { width:350px; border-radius:24px; border:1px solid var(--line); background:var(--bg); padding:18px; display:grid; gap:10px; text-align:center; }
    h1 { font:400 24px 'Fredoka One',sans-serif; }
    .badge { width:96px; height:96px; margin:auto; border-radius:24px; border:1px solid var(--line); display:grid; place-items:center; background:linear-gradient(135deg, #fafffd, #e8f5d2); }
    .clap { font-size:42px; animation:clap .8s ease-in-out infinite alternate; }
    @keyframes clap { from { transform:rotate(-6deg) scale(1); } to { transform:rotate(6deg) scale(1.12);} }
    .milestone { font-weight:800; color:#ff9600; font-size:18px; }
    .actions { display:flex; gap:8px; }
    .btn { flex:1; border-radius:12px; padding:10px; text-decoration:none; font-weight:800; border:1px solid var(--line); color:var(--text); background:#fff; }
    .btn.main { background:var(--primary); color:#fff; border-color:transparent; }
  </style>
</head>
<body>
  <article class="popup">
    <div class="badge"><div class="clap">👏</div></div>
    <h1>Milestone Unlocked</h1>
    <p class="milestone">67-day streak reached</p>
    <p style="color:var(--text-sec)">You unlocked the 3rd-month commemorative badge. Share your progress to clan feed.</p>
    <div class="actions">
      <button class="btn" id="shareBtn">Share</button>
      <a class="btn main" href="../../home-wireframe.html">Go to App</a>
    </div>
  </article>
  <script>
    document.getElementById('shareBtn').addEventListener('click', () => {
      window.alert('Demo share posted to clan feed.');
    });
  </script>
</body>
</html>
