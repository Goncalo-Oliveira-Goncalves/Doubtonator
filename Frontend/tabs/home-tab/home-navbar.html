<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Home Navbar — Doubtonator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#342e37; --surface:#3e3842; --surface-2:#4a4450; --primary:#9fd356; --warning:#ff9600; --text:#fafffd; --text-sec:#858287; }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body { background:#1e1a21; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:40px; padding:40px 24px; font-family:'Fredoka One',sans-serif; color:var(--text); }
    .eyebrow { font-family:'Nunito',sans-serif; font-weight:800; font-size:11px; letter-spacing:2.5px; text-transform:uppercase; color:var(--primary); opacity:.8; }
    .section-lbl { font-family:'Nunito',sans-serif; font-weight:800; font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--text-sec); opacity:.5; align-self:flex-start; margin-bottom:-28px; }

    /* Phone frame */
    .frame { width:390px; background:var(--bg); border-radius:44px; overflow:hidden; border:1px solid rgba(255,255,255,.08); box-shadow:0 24px 60px rgba(0,0,0,.5); }

    /* Navbar */
    .navbar { padding:20px 24px 16px; display:flex; align-items:center; justify-content:space-between; }

    /* Gear */
    .gear { width:36px; height:36px; border-radius:12px; background:var(--surface); display:flex; align-items:center; justify-content:center; cursor:pointer; transition:background .15s; }
    .gear:hover { background:var(--surface-2); }

    /* Streak chip */
    .chip { display:flex; align-items:center; gap:6px; background:var(--surface); border-radius:20px; padding:6px 12px; cursor:pointer; transition:background .15s; }
    .chip:hover { background:var(--surface-2); }
    .chip-val { font-family:'Nunito',sans-serif; font-weight:800; font-size:13px; }

    /* Nav right group */
    .nav-right { display:flex; align-items:center; gap:8px; }

    /* Canvas stub */
    .canvas-stub { height:120px; background:linear-gradient(to bottom,#f5f2f7,#ece8f0); margin:0; position:relative; }
    .canvas-dots { position:absolute; inset:0; opacity:.18;
      background-image:radial-gradient(circle, #342e37 1.5px, transparent 1.5px);
      background-size:20px 20px; }

    /* Divider between states */
    .divider { height:1px; background:rgba(255,255,255,.06); margin:0 24px; }

    /* States section */
    .states-wrap { padding:16px 24px 28px; display:flex; flex-direction:column; gap:12px; }
    .state-row { display:flex; align-items:center; gap:12px; }
    .state-dot { font-family:'Nunito',sans-serif; font-weight:800; font-size:11px; color:var(--text-sec); letter-spacing:.5px; width:90px; }

    /* Fire SVGs inline */
    .fire-icon { width:22px; height:22px; display:flex; align-items:center; justify-content:center; }

    /* Streak popup overlay */
    .overlay { position:fixed; inset:0; background:rgba(20,18,22,.85); display:flex; align-items:center; justify-content:center; padding:32px; opacity:0; pointer-events:none; transition:opacity .2s; z-index:100; }
    .overlay.show { opacity:1; pointer-events:all; }
    .popup { background:var(--surface); border-radius:28px; padding:32px 24px; max-width:340px; width:100%; display:flex; flex-direction:column; gap:16px; text-align:center; border:1px solid rgba(255,255,255,.08); }
    .pp-title { font-size:22px; }
    .pp-sub { font-family:'Nunito',sans-serif; font-size:14px; color:var(--text-sec); line-height:1.5; }
    .pp-stat { font-family:'Nunito',sans-serif; font-weight:800; font-size:32px; color:var(--warning); }
    .pp-stat-lbl { font-family:'Nunito',sans-serif; font-size:12px; letter-spacing:1px; text-transform:uppercase; color:var(--text-sec); margin-top:-8px; }
    .pp-close { font-family:'Nunito',sans-serif; font-weight:800; font-size:12px; letter-spacing:1.5px; text-transform:uppercase; background:var(--surface-2); color:var(--text-sec); border:1px solid rgba(255,255,255,.08); border-radius:14px; padding:12px; cursor:pointer; }
  </style>
</head>
<body>

<span class="eyebrow">Component · Home Tab</span>

<div class="frame">
  <!-- Navbar -->
  <div class="navbar">
    <div class="gear" title="Settings">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="3" stroke="#858287" stroke-width="1.8"/>
        <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z" stroke="#858287" stroke-width="1.8"/>
      </svg>
    </div>
    <div class="nav-right">
      <!-- Streak chip — orange state (current demo) -->
      <div class="chip" onclick="document.getElementById('streakPopup').classList.add('show')">
        <!-- Orange fire (3-month state) -->
        <svg class="fire-icon" viewBox="0 0 24 24" fill="none">
          <path d="M12 2C9 6 7 9 7 13a5 5 0 0010 0c0-1.5-.6-3-1.5-4.5-.75 1.5-1.5 2.2-3 2.5C12.5 9 13 5.5 12 2z" fill="url(#og1)"/>
          <path d="M12 16a2 2 0 110-4 2 2 0 010 4z" fill="rgba(255,255,255,.3)"/>
          <defs>
            <linearGradient id="og1" x1="12" y1="2" x2="12" y2="18" gradientUnits="userSpaceOnUse">
              <stop stop-color="#ffb300"/>
              <stop offset=".5" stop-color="#ff6d00"/>
              <stop offset="1" stop-color="#e63c00"/>
            </linearGradient>
          </defs>
        </svg>
        <span class="chip-val" style="color:#ff9600">67</span>
      </div>
      <!-- Sparks chip -->
      <div class="chip">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <path d="M12 2l2.5 6H21l-5.5 4 2 6.5L12 15l-5.5 3.5 2-6.5L3 8h6.5L12 2z" fill="#9fd356"/>
        </svg>
        <span class="chip-val" style="color:#9fd356">248</span>
      </div>
    </div>
  </div>

  <!-- Soft gradient fade into canvas -->
  <div class="canvas-stub">
    <div class="canvas-dots"></div>
  </div>

  <!-- Divider -->
  <div class="divider"></div>

  <!-- All streak states -->
  <div class="states-wrap">
    <div style="font-family:'Nunito',sans-serif;font-weight:800;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--text-sec);opacity:.4;margin-bottom:4px">Streak States</div>

    <!-- Grey (no streak) -->
    <div class="state-row">
      <span class="state-dot">No streak</span>
      <div class="chip" style="pointer-events:none">
        <svg class="fire-icon" viewBox="0 0 24 24" fill="none">
          <path d="M12 2C9 6 7 9 7 13a5 5 0 0010 0c0-1.5-.6-3-1.5-4.5-.75 1.5-1.5 2.2-3 2.5C12.5 9 13 5.5 12 2z" fill="rgba(133,130,135,.35)"/>
        </svg>
        <span class="chip-val" style="color:var(--text-sec)">0</span>
      </div>
    </div>

    <!-- Yellow (1st week) -->
    <div class="state-row">
      <span class="state-dot">1st week</span>
      <div class="chip" style="pointer-events:none">
        <svg class="fire-icon" viewBox="0 0 24 24" fill="none">
          <path d="M12 2C9 6 7 9 7 13a5 5 0 0010 0c0-1.5-.6-3-1.5-4.5-.75 1.5-1.5 2.2-3 2.5C12.5 9 13 5.5 12 2z" fill="url(#y1)"/>
          <defs><linearGradient id="y1" x1="12" y1="2" x2="12" y2="18" gradientUnits="userSpaceOnUse"><stop stop-color="#fff176"/><stop offset="1" stop-color="#ffcc00"/></linearGradient></defs>
        </svg>
        <span class="chip-val" style="color:#ffcc00">7</span>
      </div>
    </div>

    <!-- Yellow-Orange (1st month) -->
    <div class="state-row">
      <span class="state-dot">1st month</span>
      <div class="chip" style="pointer-events:none">
        <svg class="fire-icon" viewBox="0 0 24 24" fill="none">
          <path d="M12 2C9 6 7 9 7 13a5 5 0 0010 0c0-1.5-.6-3-1.5-4.5-.75 1.5-1.5 2.2-3 2.5C12.5 9 13 5.5 12 2z" fill="url(#yo1)"/>
          <defs><linearGradient id="yo1" x1="12" y1="2" x2="12" y2="18" gradientUnits="userSpaceOnUse"><stop stop-color="#ffe066"/><stop offset=".6" stop-color="#ff9600"/><stop offset="1" stop-color="#e65c00"/></linearGradient></defs>
        </svg>
        <span class="chip-val" style="color:#ff9600">30</span>
      </div>
    </div>

    <!-- Orange (3rd month) -->
    <div class="state-row">
      <span class="state-dot">3rd month</span>
      <div class="chip" style="pointer-events:none;background:rgba(255,150,0,.1)">
        <svg class="fire-icon" viewBox="0 0 24 24" fill="none">
          <path d="M12 2C9 6 7 9 7 13a5 5 0 0010 0c0-1.5-.6-3-1.5-4.5-.75 1.5-1.5 2.2-3 2.5C12.5 9 13 5.5 12 2z" fill="url(#og2)"/>
          <path d="M12 16a2 2 0 110-4 2 2 0 010 4z" fill="rgba(255,255,255,.3)"/>
          <defs><linearGradient id="og2" x1="12" y1="2" x2="12" y2="18" gradientUnits="userSpaceOnUse"><stop stop-color="#ffb300"/><stop offset=".5" stop-color="#ff6d00"/><stop offset="1" stop-color="#e63c00"/></linearGradient></defs>
        </svg>
        <span class="chip-val" style="color:#ff6d00">67</span>
      </div>
    </div>

    <!-- Orange-Blue (7th month) -->
    <div class="state-row">
      <span class="state-dot">7th month</span>
      <div class="chip" style="pointer-events:none;background:rgba(60,145,230,.1)">
        <svg class="fire-icon" viewBox="0 0 24 24" fill="none">
          <path d="M12 2C9 6 7 9 7 13a5 5 0 0010 0c0-1.5-.6-3-1.5-4.5-.75 1.5-1.5 2.2-3 2.5C12.5 9 13 5.5 12 2z" fill="url(#ob1)"/>
          <defs><linearGradient id="ob1" x1="12" y1="2" x2="12" y2="18" gradientUnits="userSpaceOnUse"><stop stop-color="#ff9600"/><stop offset=".55" stop-color="#e63c6e"/><stop offset="1" stop-color="#3c91e6"/></linearGradient></defs>
        </svg>
        <span class="chip-val" style="color:#3c91e6">210</span>
      </div>
    </div>

    <!-- Blue (1 year) -->
    <div class="state-row">
      <span class="state-dot">1 year</span>
      <div class="chip" style="pointer-events:none;background:rgba(60,145,230,.12)">
        <svg class="fire-icon" viewBox="0 0 24 24" fill="none">
          <path d="M12 2C9 6 7 9 7 13a5 5 0 0010 0c0-1.5-.6-3-1.5-4.5-.75 1.5-1.5 2.2-3 2.5C12.5 9 13 5.5 12 2z" fill="url(#bl1)"/>
          <path d="M12 16.5a2.5 2.5 0 110-5 2.5 2.5 0 010 5z" fill="rgba(255,255,255,.25)"/>
          <defs><linearGradient id="bl1" x1="12" y1="2" x2="12" y2="18" gradientUnits="userSpaceOnUse"><stop stop-color="#7ecfff"/><stop offset=".5" stop-color="#3c91e6"/><stop offset="1" stop-color="#1a4fa8"/></linearGradient></defs>
        </svg>
        <span class="chip-val" style="color:#7ecfff">365</span>
      </div>
    </div>
  </div>
</div>

<!-- Streak popup -->
<div class="overlay" id="streakPopup" onclick="if(event.target===this)classList.remove('show')">
  <div class="popup">
    <svg style="align-self:center" width="48" height="48" viewBox="0 0 24 24" fill="none">
      <path d="M12 2C9 6 7 9 7 13a5 5 0 0010 0c0-1.5-.6-3-1.5-4.5-.75 1.5-1.5 2.2-3 2.5C12.5 9 13 5.5 12 2z" fill="url(#sp1)"/>
      <defs><linearGradient id="sp1" x1="12" y1="2" x2="12" y2="18" gradientUnits="userSpaceOnUse"><stop stop-color="#ffb300"/><stop offset=".5" stop-color="#ff6d00"/><stop offset="1" stop-color="#e63c00"/></linearGradient></defs>
    </svg>
    <span class="pp-title">Your Streak</span>
    <div class="pp-stat">67</div>
    <div class="pp-stat-lbl">Days in a row</div>
    <p class="pp-sub">You've been on fire for 67 days! Keep going — you're just 23 days from the 3-month badge.</p>
    <button class="pp-close" onclick="document.getElementById('streakPopup').classList.remove('show')">CLOSE</button>
  </div>
</div>

</body>
</html>
