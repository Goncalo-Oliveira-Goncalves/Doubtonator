<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Node Popup Arrow Logic</title>
  <style>
    :root { --bg:#fafffd; --surface:#ffffff; --text:#342e37; --muted:#5d585f; --border:#aeabaf; --primary:#9fd356; }
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:var(--bg);font-family:'Nunito',system-ui}
    .stage{position:relative;width:min(430px,94vw);height:700px;border:1px solid var(--border);border-radius:24px;background:#fff;overflow:hidden}
    .grid{position:absolute;inset:0;background-image:radial-gradient(circle, rgba(52,46,55,.18) 1.1px, transparent 1.1px);background-size:22px 22px}
    .node{position:absolute;left:56%;top:46%;transform:translate(-50%,-50%);width:74px;height:74px;border-radius:18px;border:2px solid #3c91e6;background:#fff;display:grid;place-items:center;cursor:pointer;z-index:2}
    .node img{width:26px;height:26px}
    .popup{position:absolute;min-width:170px;max-width:200px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:12px 12px 10px;z-index:3}
    .title{font:700 13px 'Fredoka One',system-ui;color:var(--text);margin:0 0 6px}
    .sub{font-size:12px;line-height:1.4;color:var(--muted);margin:0 0 10px}
    .btn{border:1px solid var(--border);background:var(--primary);color:#342e37;border-radius:9px;padding:7px 10px;font:800 10px 'Nunito',system-ui;letter-spacing:1px;text-transform:uppercase}
    .arrow{position:absolute;width:14px;height:14px;background:#fff;border-left:1px solid var(--border);border-top:1px solid var(--border);transform:rotate(45deg)}
  </style>
</head>
<body>
  <div class="stage" id="stage">
    <div class="grid"></div>
    <button class="node" id="node"><img src="../../../../assets/other-ui-elements/clapper-board.svg" alt=""></button>
    <div class="popup" id="popup">
      <div class="arrow" id="arrow"></div>
      <h3 class="title">Agent Node</h3>
      <p class="sub">Popup placement uses nearest intersection edge toward node center.</p>
      <button class="btn">View Agent</button>
    </div>
  </div>
  <script>
    const stage = document.getElementById("stage");
    const node = document.getElementById("node");
    const popup = document.getElementById("popup");
    const arrow = document.getElementById("arrow");

    function placePopup() {
      const s = stage.getBoundingClientRect();
      const n = node.getBoundingClientRect();
      const nodeCx = n.left - s.left + n.width / 2;
      const nodeCy = n.top - s.top + n.height / 2;

      let px = nodeCx - 90;
      let py = nodeCy - 170;
      px = Math.max(8, Math.min(s.width - popup.offsetWidth - 8, px));
      py = Math.max(8, Math.min(s.height - popup.offsetHeight - 8, py));

      popup.style.left = px + "px";
      popup.style.top = py + "px";

      const centerX = px + popup.offsetWidth / 2;
      const centerY = py + popup.offsetHeight / 2;
      const dx = nodeCx - centerX;
      const dy = nodeCy - centerY;

      if (Math.abs(dx) > Math.abs(dy)) {
        // left or right side
        if (dx > 0) {
          arrow.style.left = (popup.offsetWidth - 8) + "px";
          arrow.style.top = (popup.offsetHeight / 2 - 7) + "px";
        } else {
          arrow.style.left = "-7px";
          arrow.style.top = (popup.offsetHeight / 2 - 7) + "px";
        }
      } else {
        // top or bottom side
        if (dy > 0) {
          arrow.style.left = (popup.offsetWidth / 2 - 7) + "px";
          arrow.style.top = (popup.offsetHeight - 8) + "px";
        } else {
          arrow.style.left = (popup.offsetWidth / 2 - 7) + "px";
          arrow.style.top = "-7px";
        }
      }
    }

    window.addEventListener("resize", placePopup);
    node.addEventListener("click", placePopup);
    placePopup();
  </script>
</body>
</html>
