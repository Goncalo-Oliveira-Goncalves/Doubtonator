<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quests Top Nav — Doubtonator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#fafffd; --surface:#d6d5d7; --surface-2:#ecebed; --primary:#9fd356; --warning:#ff9600; --text:#342e37; --text-sec:#5d585f; --muted:#aeabaf; }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body { background:var(--bg); min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:48px; padding:48px 24px; font-family:'Fredoka One',sans-serif; color:var(--text); }
    .eyebrow { font-family:'Nunito',sans-serif; font-weight:800; font-size:11px; letter-spacing:2.5px; text-transform:uppercase; color:var(--primary); opacity:.8; }
    .header { text-align:center; display:flex; flex-direction:column; gap:5px; }
    .header h1 { font-size:24px; }
    .header p  { font-family:'Nunito',sans-serif; font-size:13px; color:var(--text-sec); }
    /* Phone frame context */
    .frame { width:390px; background:var(--bg); border-radius:44px; overflow:hidden; border:1px solid rgba(52,46,55,.16); box-shadow:0 20px 44px rgba(0,0,0,.16); }
    /* Top nav area */
    .top-nav { padding:24px 24px 18px; display:flex; flex-direction:column; gap:16px; }
    .nav-row  { display:grid; grid-template-columns:1fr auto 1fr; align-items:center; }
    .nav-col-left { justify-self:start; }
    .nav-col-mid { justify-self:center; }
    .nav-col-right { justify-self:end; }
    /* Streak chip */
    .chip { display:flex; align-items:center; gap:6px; background:transparent; border-radius:20px; padding:8px 14px; cursor:pointer; transition:background .15s; border:none; }
    .chip:hover { background:rgba(52,46,55,.06); }
    .chip-val { font-family:'Nunito',sans-serif; font-weight:800; font-size:16px; letter-spacing:0; }
    /* XP bar */
    .lv-stack { width:132px; height:42px; position:relative; display:flex; align-items:center; }
    .lv-track {
      width:100%;
      height:12px;
      background:var(--surface-2);
      border-radius:8px;
      overflow:hidden;
      position:relative;
    }
    .lv-fill {
      height:100%;
      background:linear-gradient(90deg,var(--primary),#b2dc78);
      clip-path:polygon(0 0, calc(100% - 10px) 0, 100% 50%, calc(100% - 10px) 100%, 0 100%);
      transition:width 1s cubic-bezier(.22,1,.36,1);
      width:0;
    }
    .lv-pill {
      position:absolute;
      left:8px;
      top:50%;
      transform:translateY(-50%);
      background:var(--surface);
      border:1px solid rgba(52,46,55,.14);
      border-radius:999px;
      padding:5px 10px;
      font-family:'Nunito',sans-serif;
      font-weight:800;
      font-size:11px;
      letter-spacing:1px;
      color:var(--text);
    }
    .lv-tag {
      position:absolute;
      top:-4px;
      left:-8px;
      transform:translate(-50%,-50%);
      font-family:'Nunito',sans-serif;
      font-weight:800;
      font-size:9px;
      letter-spacing:1.5px;
      text-transform:uppercase;
      color:var(--primary);
      background:var(--bg);
      padding:1px 5px;
      border-radius:999px;
    }
    /* Mock quests below */
    .mock { padding:0 16px 24px; display:flex; flex-direction:column; gap:10px; }
    .mock-card { height:72px; background:var(--surface); border-radius:16px; opacity:.28; }
    .mock-card:nth-child(2){opacity:.2} .mock-card:nth-child(3){opacity:.12}
  </style>
</head>
<body>
<div class="header">
  <span class="eyebrow">Component · Quests</span>
  <h1>Quests Top Navigation</h1>
  <p>Level badge, XP bar, streak &amp; sparks</p>
</div>

<div class="frame">
  <div class="top-nav">
    <div class="nav-row">
      <div class="nav-col-left">
        <div class="lv-stack" title="Level progress">
          <div class="lv-track"><div class="lv-fill" id="fill"></div></div>
          <div class="lv-pill"><span class="lv-tag">LV</span>12</div>
        </div>
      </div>
      <div class="nav-col-mid">
        <div class="chip" title="Streak">
          <img width="22" height="22" src="../../../assets/streak/orange-fire.svg" alt="Streak">
          <span class="chip-val" style="color:#ff9600">18</span>
        </div>
      </div>
      <div class="nav-col-right">
        <div class="chip" title="Sparks">
          <img width="22" height="22" src="../../../assets/spark-2d.svg" alt="Sparks">
          <span class="chip-val" style="color:#ffcc00">248</span>
        </div>
      </div>
    </div>
  </div>
  <!-- Ghost cards to show context -->
  <div class="mock">
    <div class="mock-card"></div>
    <div class="mock-card"></div>
    <div class="mock-card"></div>
  </div>
</div>

<script>
  window.addEventListener('load',()=>setTimeout(()=>document.getElementById('fill').style.width='81%',100));
</script>
</body>
</html>
