<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Talk Button — Doubtonator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    /* ── Brand tokens (from brand-guidelines.md) ─── */
    :root {
      --bg:            #342e37;   /* Lava Black */
      --surface:       #3e3842;
      --surface-2:     #4a4450;
      --primary:       #9fd356;   /* Lone Hunter */
      --primary-sub:   #ecf6dd;
      --danger:        #e63c3c;   /* Uh Oh Red */
      --danger-sub:    #fad8d8;
      --text:          #fafffd;   /* Everlasting Ice */
      --text-sec:      #858287;
      --border:        #5d585f;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
      gap: 36px;
      font-family: 'Fredoka One', system-ui, sans-serif;
      color: var(--text);
    }

    /* ── Demo header ─────────────────────────────── */
    .header {
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .header-eyebrow {
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 11px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--primary);
      opacity: 0.8;
    }
    .header-title {
      font-size: 24px;
      letter-spacing: 0.3px;
    }
    .header-sub {
      font-family: 'Nunito', sans-serif;
      font-size: 13px;
      color: var(--text-sec);
    }

    /* ── State labels row ────────────────────────── */
    .states-row {
      display: flex;
      align-items: flex-start;
      gap: 40px;
    }

    .state-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .state-tag {
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-sec);
      opacity: 0.55;
    }

    /* ── Ghost (static) demo buttons ────────────── */
    .ghost-btn {
      position: relative;
      width: 220px;
      height: 60px;
      opacity: 0.55;
      pointer-events: none;
    }
    .ghost-btn svg { position: absolute; inset: 0; width: 100%; height: 100%; overflow: visible; }
    .ghost-btn .btn-fill { fill: var(--surface-2); }
    .ghost-btn.recording .btn-fill { stroke: var(--danger); stroke-width: 3.5; fill: var(--surface-2); }
    .ghost-content {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 22px;
    }
    .ghost-label {
      font-family: 'Nunito', sans-serif; font-weight: 800;
      font-size: 14px; letter-spacing: 1.5px; text-transform: uppercase;
    }
    .ghost-wave { display: flex; align-items: center; gap: 3px; height: 24px; }
    .ghost-bar { width: 3.5px; border-radius: 2px; background: var(--primary); }
    .ghost-btn.recording .ghost-bar { background: var(--danger); }
    .ghost-bar:nth-child(1) { height: 8px; }
    .ghost-bar:nth-child(2) { height: 15px; }
    .ghost-bar:nth-child(3) { height: 21px; }
    .ghost-bar:nth-child(4) { height: 15px; }
    .ghost-bar:nth-child(5) { height: 8px; }

    /* ── Divider ─────────────────────────────────── */
    .divider {
      width: 100%;
      max-width: 480px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .divider hr { flex: 1; border: none; border-top: 1px solid var(--border); opacity: 0.4; }
    .divider span {
      font-family: 'Nunito', sans-serif; font-size: 11px; font-weight: 600;
      letter-spacing: 2px; text-transform: uppercase; color: var(--text-sec); opacity: 0.4;
    }

    /* ── Interactive demo card ───────────────────── */
    .demo-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding: 40px 48px 32px;
      background: rgba(255,255,255,0.025);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 28px;
    }

    /* ── THE LIVE TALK BUTTON ────────────────────── */
    .talk-btn {
      position: relative;
      width: 260px;
      height: 68px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      outline: none;
    }

    /* SVG that morphs */
    .talk-shape-svg {
      position: absolute;
      top: 0; left: 0;
      width: 260px; height: 68px;
      overflow: visible;
    }
    .btn-fill { fill: var(--surface-2); }
    .talk-btn.is-recording .btn-fill {
      stroke: var(--danger);
      stroke-width: 4;
      stroke-linejoin: round;
    }

    /* Content on top */
    .talk-content {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 28px;
      pointer-events: none;
    }
    .talk-label {
      font-family: 'Nunito', sans-serif; font-weight: 800;
      font-size: 15px; letter-spacing: 1.5px; text-transform: uppercase;
      color: var(--text);
      transition: color 0.2s;
    }

    /* Soundwave bars */
    .soundwave { display: flex; align-items: center; gap: 4px; height: 30px; }
    .sw-bar {
      width: 4px; border-radius: 2px;
      background: var(--primary);
      transition: background 0.2s, height 0.08s;
    }
    /* Idle heights */
    .sw-bar:nth-child(1) { height: 9px; }
    .sw-bar:nth-child(2) { height: 16px; }
    .sw-bar:nth-child(3) { height: 22px; }
    .sw-bar:nth-child(4) { height: 16px; }
    .sw-bar:nth-child(5) { height: 9px; }

    /* Recording: animated bars */
    .talk-btn.is-recording .sw-bar { background: var(--danger); }
    .talk-btn.is-recording .sw-bar:nth-child(1) { --min:5px; --max:20px; animation: swBar 0.55s ease-in-out infinite alternate; animation-delay: 0.00s; }
    .talk-btn.is-recording .sw-bar:nth-child(2) { --min:10px; --max:26px; animation: swBar 0.55s ease-in-out infinite alternate; animation-delay: 0.09s; }
    .talk-btn.is-recording .sw-bar:nth-child(3) { --min:16px; --max:29px; animation: swBar 0.55s ease-in-out infinite alternate; animation-delay: 0.18s; }
    .talk-btn.is-recording .sw-bar:nth-child(4) { --min:10px; --max:26px; animation: swBar 0.55s ease-in-out infinite alternate; animation-delay: 0.09s; }
    .talk-btn.is-recording .sw-bar:nth-child(5) { --min:5px; --max:20px; animation: swBar 0.55s ease-in-out infinite alternate; animation-delay: 0.00s; }
    @keyframes swBar { from { height: var(--min,6px); } to { height: var(--max,22px); } }

    /* Glow halo */
    .btn-glow {
      position: absolute;
      bottom: -14px; left: 50%;
      transform: translateX(-50%);
      width: 130px; height: 18px;
      border-radius: 50%;
      background: var(--primary);
      filter: blur(12px);
      opacity: 0.18;
      pointer-events: none;
      transition: background 0.3s, opacity 0.35s, width 0.35s;
    }
    .talk-btn.is-recording .btn-glow {
      background: var(--danger);
      opacity: 0.45;
      width: 200px;
    }

    /* ── Status row ──────────────────────────────── */
    .status-row {
      display: flex; align-items: center; gap: 8px;
      font-family: 'Nunito', sans-serif;
      font-size: 12px; font-weight: 600;
      letter-spacing: 1.2px; text-transform: uppercase;
      color: var(--text-sec);
    }
    .rec-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--danger); opacity: 0;
      transition: opacity 0.2s;
    }
    .status-row.is-recording .rec-dot {
      opacity: 1;
      animation: blinkDot 1.1s ease-in-out infinite;
    }
    @keyframes blinkDot { 0%,100%{opacity:1;} 50%{opacity:0.1;} }

    .mic-chip {
      font-family: 'Nunito', sans-serif;
      font-size: 11px; font-weight: 600;
      color: var(--text-sec); opacity: 0.4;
      letter-spacing: 0.3px;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <span class="header-eyebrow">Quest · Answer Questions</span>
    <h1 class="header-title">Talk Button</h1>
    <p class="header-sub">Tap the button below to toggle recording state</p>
  </div>

  <!-- Static state previews -->
  <div class="states-row">

    <div class="state-col">
      <span class="state-tag">Idle</span>
      <div class="ghost-btn">
        <svg viewBox="0 0 220 60"><path class="btn-fill" d="M 30 0 L 190 0 A 30 30 0 0 1 190 60 L 30 60 A 30 30 0 0 1 30 0 Z"/></svg>
        <div class="ghost-content">
          <span class="ghost-label">Talk</span>
          <div class="ghost-wave">
            <div class="ghost-bar"></div>
            <div class="ghost-bar"></div>
            <div class="ghost-bar"></div>
            <div class="ghost-bar"></div>
            <div class="ghost-bar"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="state-col">
      <span class="state-tag">Recording</span>
      <div class="ghost-btn recording">
        <!-- Wavy shape (static snapshot) -->
        <svg viewBox="0 0 220 60" overflow="visible">
          <path class="btn-fill" d="M 30 0 Q 30 0 35 -3 T 50 -4 T 70 2 T 90 -5 T 110 0 T 130 5 T 150 -2 T 170 -4 T 190 0 A 30 30 0 0 1 190 60 L 190 64 Q 190 64 170 62 T 150 58 T 130 65 T 110 60 T 90 55 T 70 62 T 50 64 T 30 60 A 30 30 0 0 1 30 0 Z"/>
        </svg>
        <div class="ghost-content">
          <span class="ghost-label">Talk</span>
          <div class="ghost-wave">
            <div class="ghost-bar"></div>
            <div class="ghost-bar"></div>
            <div class="ghost-bar"></div>
            <div class="ghost-bar"></div>
            <div class="ghost-bar"></div>
          </div>
        </div>
      </div>
    </div>

  </div>

  <div class="divider">
    <hr><span>Live Demo</span><hr>
  </div>

  <!-- Interactive demo -->
  <div class="demo-card">

    <div class="talk-btn" id="talkBtn" tabindex="0" role="button" aria-label="Talk">
      <svg class="talk-shape-svg" viewBox="0 0 260 68" xmlns="http://www.w3.org/2000/svg">
        <path class="btn-fill" id="btnPath" d=""/>
      </svg>
      <div class="talk-content">
        <span class="talk-label">Talk</span>
        <div class="soundwave" id="soundwave">
          <div class="sw-bar"></div>
          <div class="sw-bar"></div>
          <div class="sw-bar"></div>
          <div class="sw-bar"></div>
          <div class="sw-bar"></div>
        </div>
      </div>
      <div class="btn-glow"></div>
    </div>

    <div class="status-row" id="statusRow">
      <div class="rec-dot"></div>
      <span id="statusText">Ready to talk</span>
    </div>

    <span class="mic-chip" id="micChip">Click to start recording</span>

  </div>

  <script>
    // ── Button geometry constants ─────────────────────────────────────────
    const W = 260, H = 68, R = 34;
    const LEFT_X = R;           // 34
    const RIGHT_X = W - R;      // 226
    const TOP_Y = 0, BOT_Y = H; // 0, 68
    const N = 36;               // wave sample count per edge

    // ── DOM refs ──────────────────────────────────────────────────────────
    const talkBtn   = document.getElementById('talkBtn');
    const btnPath   = document.getElementById('btnPath');
    const statusRow = document.getElementById('statusRow');
    const statusTxt = document.getElementById('statusText');
    const micChip   = document.getElementById('micChip');

    // ── State ─────────────────────────────────────────────────────────────
    let isRecording = false;
    let raf = null;
    let t = 0;
    let vol = 0, targetVol = 0;
    let analyser = null, analyserBuf = null;
    let micStream = null, audioCtx = null;

    // ── Path builders ─────────────────────────────────────────────────────
    function idlePath() {
      return `M ${LEFT_X} ${TOP_Y} L ${RIGHT_X} ${TOP_Y} A ${R} ${R} 0 0 1 ${RIGHT_X} ${BOT_Y} L ${LEFT_X} ${BOT_Y} A ${R} ${R} 0 0 1 ${LEFT_X} ${TOP_Y} Z`;
    }

    function wavyPath(volume, time) {
      const top = [], bot = [];

      for (let i = 0; i <= N; i++) {
        const p = i / N;
        const x = LEFT_X + p * (RIGHT_X - LEFT_X);
        // Amplitude fades to 0 at both ends so it blends into the corner arcs
        const fade = Math.sin(p * Math.PI);
        const amp  = volume * 22 * fade;
        const w =
          Math.sin(p * Math.PI * 3.1 + time * 2.5) * amp * 0.65 +
          Math.sin(p * Math.PI * 7.3 + time * 4.2 + 1.1) * amp * 0.35;
        top.push([x, TOP_Y + w]);
        bot.push([x, BOT_Y - w]);
      }

      // Q + T chain (Q control = first point so segment is nearly linear, then T continues smoothly)
      function chain(pts) {
        if (pts.length < 2) return '';
        let s = `Q ${f(pts[0][0])} ${f(pts[0][1])} ${f(pts[1][0])} ${f(pts[1][1])} `;
        for (let i = 2; i < pts.length; i++) s += `T ${f(pts[i][0])} ${f(pts[i][1])} `;
        return s;
      }

      const revBot = [...bot].reverse();
      return (
        `M ${f(top[0][0])} ${f(top[0][1])} ` +
        chain(top) +
        `A ${R} ${R} 0 0 1 ${RIGHT_X} ${BOT_Y} ` +
        `L ${f(revBot[0][0])} ${f(revBot[0][1])} ` +
        chain(revBot) +
        `A ${R} ${R} 0 0 1 ${LEFT_X} ${TOP_Y} Z`
      );
    }

    function f(n) { return n.toFixed(2); }

    // ── Init ──────────────────────────────────────────────────────────────
    btnPath.setAttribute('d', idlePath());

    // ── Animation tick ────────────────────────────────────────────────────
    function tick() {
      if (!isRecording) return;
      t += 0.018;

      if (analyser && analyserBuf) {
        analyser.getFloatTimeDomainData(analyserBuf);
        let sum = 0;
        for (let i = 0; i < analyserBuf.length; i++) sum += analyserBuf[i] ** 2;
        targetVol = Math.min(1, Math.sqrt(sum / analyserBuf.length) * 5);
      } else {
        // Simulated organic waveform
        targetVol = 0.32 + Math.sin(t * 1.4) * 0.16 + Math.sin(t * 3.1) * 0.07 + Math.random() * 0.04;
      }

      vol += (targetVol - vol) * 0.12;
      btnPath.setAttribute('d', wavyPath(vol, t));
      raf = requestAnimationFrame(tick);
    }

    // ── Fade-out on stop ──────────────────────────────────────────────────
    function fadeToIdle() {
      vol *= 0.82;
      if (vol > 0.008) {
        btnPath.setAttribute('d', wavyPath(vol, t));
        raf = requestAnimationFrame(fadeToIdle);
      } else {
        btnPath.setAttribute('d', idlePath());
      }
    }

    // ── Start recording ───────────────────────────────────────────────────
    async function startRecording() {
      isRecording = true;
      talkBtn.classList.add('is-recording');
      statusRow.classList.add('is-recording');
      statusTxt.textContent = 'Recording…';
      micChip.textContent = 'Requesting microphone…';

      try {
        micStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
        audioCtx  = new AudioContext();
        const src = audioCtx.createMediaStreamSource(micStream);
        analyser  = audioCtx.createAnalyser();
        analyser.fftSize = 256;
        analyserBuf = new Float32Array(analyser.frequencyBinCount);
        src.connect(analyser);
        micChip.textContent = '● Microphone active';
      } catch {
        micChip.textContent = 'Simulated waveform (mic unavailable)';
      }

      tick();
    }

    // ── Stop recording ────────────────────────────────────────────────────
    function stopRecording() {
      isRecording = false;
      talkBtn.classList.remove('is-recording');
      statusRow.classList.remove('is-recording');
      statusTxt.textContent = 'Ready to talk';
      micChip.textContent = 'Click to start recording';

      cancelAnimationFrame(raf);
      raf = null;

      if (micStream) { micStream.getTracks().forEach(tr => tr.stop()); micStream = null; }
      if (audioCtx)  { audioCtx.close(); audioCtx = null; analyser = null; analyserBuf = null; }

      fadeToIdle();
    }

    // ── Toggle ────────────────────────────────────────────────────────────
    talkBtn.addEventListener('click', () => {
      if (isRecording) stopRecording();
      else startRecording();
    });

    talkBtn.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        talkBtn.click();
      }
    });
  </script>

</body>
</html>
