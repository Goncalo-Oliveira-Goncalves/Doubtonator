<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Clan Top Navbar</title><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;800&display=swap" rel="stylesheet"><style>:root{--bg:#342e37;--surface:#3e3842;--surface-2:#4a4450;--text:#fafffd;--text-sec:#858287;--primary:#9fd356;--border:rgba(255,255,255,.08)}*{box-sizing:border-box}body{margin:0;background:#1e1a21;min-height:100vh;display:grid;place-items:center;font-family:'Fredoka One',sans-serif;color:var(--text)}.phone{width:min(390px,95vw);background:var(--bg);padding:20px 18px 16px;border:1px solid var(--border);border-radius:24px;box-shadow:0 24px 64px rgba(0,0,0,.45)}.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}.title{font-size:20px}.meta{font:800 10px 'Nunito',sans-serif;color:var(--text-sec);letter-spacing:1.2px;text-transform:uppercase}.tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.tab{border:1px solid var(--border);background:var(--surface);color:var(--text-sec);border-radius:14px;padding:10px 8px;cursor:pointer;text-align:center;font:800 11px 'Nunito',sans-serif;letter-spacing:1px;text-transform:uppercase}.tab.active{background:rgba(159,211,86,.14);color:var(--primary);border-color:rgba(159,211,86,.3)}.panel{margin-top:12px;padding:10px 12px;background:var(--surface);border-radius:12px;border:1px solid var(--border);font:600 12px 'Nunito',sans-serif;color:var(--text-sec)}</style></head><body><div class="phone"><div class="top"><div class="title">Clan</div><div class="meta">Top Nav</div></div><div class="tabs" id="tabs"><button class="tab active" data-tab="tournaments">Tournaments</button><button class="tab" data-tab="chat">Chat</button><button class="tab" data-tab="friends">Friends</button></div><div class="panel" id="panel">Tournament ranking, badge strip and status cards.</div></div><script>const descriptions={tournaments:'Tournament ranking, badge strip and status cards.',chat:'Community feed with markdown posts and pin support.',friends:'DM-first friends list and private chat view.'};document.getElementById('tabs').addEventListener('click',(e)=>{const b=e.target.closest('.tab');if(!b)return;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));b.classList.add('active');document.getElementById('panel').textContent=descriptions[b.dataset.tab]||'';});</script></body></html>
