<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Calendar Tab</title><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;800&display=swap" rel="stylesheet"><style>:root{--bg:#342e37;--surface:#3e3842;--text:#fafffd;--text-sec:#858287;--primary:#9fd356;--border:rgba(255,255,255,.08)}*{box-sizing:border-box}body{margin:0;background:#1e1a21;min-height:100vh;display:grid;place-items:center;font-family:'Fredoka One',sans-serif;color:var(--text)}.phone{width:390px;height:844px;background:var(--bg);border-radius:44px;border:1px solid var(--border);padding:16px;display:flex;flex-direction:column;gap:12px}.title{font-size:22px}.streak{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:10px;display:flex;justify-content:space-between;align-items:center}.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}.d{background:var(--surface);border:1px solid var(--border);height:42px;border-radius:10px;display:grid;place-items:center;position:relative;cursor:pointer}.d.disabled{opacity:.45;cursor:not-allowed}.d img{position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:14px;height:14px}.time{flex:1;overflow:auto;display:flex;flex-direction:column;gap:8px}.ev{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px}.ev .t{font:700 11px 'Nunito',sans-serif;color:var(--text-sec)}.ev .n{font-size:13px}</style></head><body><div class="phone"><div class="title">Calendar</div><div class="streak"><span>Current streak</span><span style="color:var(--primary)">12 days</span></div><div class="grid" id="grid"></div><div style="font:800 11px 'Nunito',sans-serif;letter-spacing:1px;color:var(--text-sec);text-transform:uppercase">Upcoming Events</div><div class="time"><div class="ev"><div class="n">Weekly call with mentors</div><div class="t">Apr 03 - 18:00</div></div><div class="ev"><div class="n">Tournament ends</div><div class="t">Apr 07 - 23:59</div></div><div class="ev"><div class="n">Reward stream</div><div class="t">Apr 08 - 20:00</div></div></div></div><script>const events={3:'call',7:'tournament',8:'call'};const g=document.getElementById('grid');for(let i=1;i<=30;i++){const d=document.createElement('button');d.className='d'+(events[i]?'':' disabled');d.textContent=i;if(events[i]){const im=document.createElement('img');im.src=events[i]==='call'?'../assets/calendar-tab-event-highlights/call-highlight.svg':'../assets/calendar-tab-event-highlights/tournament-end-highlight.svg';im.alt='event';d.appendChild(im);d.addEventListener('click',()=>alert('Open day timeline popup for day '+i));}g.appendChild(d);}</script></body></html>
