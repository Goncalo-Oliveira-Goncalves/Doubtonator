<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Journal - Note Popup</title>
  <style>
    :root { --bg:#fafffd; --surface:#fff; --surface-2:#f2f8e8; --text:#342e37; --muted:#5d585f; --border:#aeabaf; --primary:#9fd356; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; display:grid; place-items:center; padding:20px; background:var(--bg); font-family:'Nunito',system-ui,sans-serif; color:var(--text); }
    .popup { width:min(360px,96vw); border:1px solid var(--border); border-radius:16px; background:var(--surface); padding:14px; box-shadow:0 14px 34px rgba(0,0,0,.12); }
    h1 { margin:0 0 10px; font:700 18px 'Fredoka One',system-ui; }
    label { display:block; margin:0 0 6px; font:800 10px 'Nunito',sans-serif; letter-spacing:1px; text-transform:uppercase; color:var(--muted); }
    input, textarea { width:100%; border:1px solid var(--border); border-radius:10px; padding:9px; font:600 13px 'Nunito',sans-serif; color:var(--text); background:var(--surface-2); margin-bottom:10px; }
    textarea { min-height:120px; resize:vertical; }
    .actions { display:flex; justify-content:flex-end; gap:8px; }
    button { border:1px solid var(--border); border-radius:9px; padding:8px 10px; font:800 10px 'Nunito',sans-serif; letter-spacing:1px; text-transform:uppercase; }
    .save { background:var(--primary); color:var(--text); }
  </style>
</head>
<body>
  <form class="popup">
    <h1>New Journal Note</h1>
    <label for="note-title">Title</label>
    <input id="note-title" value="Intent for tomorrow">
    <label for="note-body">Note</label>
    <textarea id="note-body">Start with one 45-minute deep block before checking notifications.</textarea>
    <div class="actions">
      <button type="button">Cancel</button>
      <button type="submit" class="save">Save Note</button>
    </div>
  </form>
</body>
</html>
