<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Chart - Flexible Grid</title>
<style>:root{--bg:#fafffd;--surface:#fff;--border:#aeabaf;--text:#342e37;--primary:#9fd356}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:var(--bg);font-family:'Nunito',sans-serif}.card{width:min(760px,95vw);background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:14px}h1{margin:0 0 10px;font:700 18px 'Fredoka One',system-ui}.controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px}input{width:64px;border:1px solid var(--border);border-radius:8px;padding:6px}.grid{display:grid;gap:4px}.cell{aspect-ratio:1;border:1px solid var(--border);border-radius:6px;display:grid;place-items:center;font-size:10px;color:var(--text);background:#f6faef}.active{background:rgba(159,211,86,.45)}</style></head>
<body><section class="card"><h1>Flexible Grid Demo (up to 9x9)</h1><div class="controls"><label>Rows <input id="rows" type="number" min="1" max="9" value="4"></label><label>Cols <input id="cols" type="number" min="1" max="9" value="6"></label></div><div id="grid" class="grid"></div></section><script>const rows=document.getElementById("rows");const cols=document.getElementById("cols");const grid=document.getElementById("grid");function draw(){const r=Math.max(1,Math.min(9,Number(rows.value)||1));const c=Math.max(1,Math.min(9,Number(cols.value)||1));grid.style.gridTemplateColumns=`repeat(${c},1fr)`;grid.innerHTML="";for(let i=0;i<r*c;i++){const d=document.createElement("div");d.className="cell"+(i%3===0?" active":"");d.textContent=i+1;grid.appendChild(d);}}rows.addEventListener("input",draw);cols.addEventListener("input",draw);draw();</script></body></html>
