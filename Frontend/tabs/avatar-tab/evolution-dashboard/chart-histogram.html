<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Chart - Histogram</title>
<style>:root{--bg:#fafffd;--surface:#fff;--border:#aeabaf;--text:#342e37;--primary:#9fd356}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:var(--bg);font-family:'Nunito',sans-serif}.card{width:min(640px,94vw);background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:14px}h1{margin:0 0 10px;font:700 18px 'Fredoka One',system-ui}.plot{display:flex;align-items:flex-end;height:240px;border-left:1px solid var(--border);border-bottom:1px solid var(--border);padding:0 0 0 8px;gap:2px}.bin{width:32px;background:rgba(159,211,86,.76);border:1px solid rgba(52,46,55,.14);border-bottom:0}</style></head>
<body><section class="card"><h1>Histogram Demo</h1><div class="plot"><div class="bin" style="height:12%"></div><div class="bin" style="height:18%"></div><div class="bin" style="height:30%"></div><div class="bin" style="height:48%"></div><div class="bin" style="height:70%"></div><div class="bin" style="height:88%"></div><div class="bin" style="height:78%"></div><div class="bin" style="height:61%"></div><div class="bin" style="height:43%"></div><div class="bin" style="height:33%"></div><div class="bin" style="height:19%"></div><div class="bin" style="height:14%"></div></div></section></body></html>
