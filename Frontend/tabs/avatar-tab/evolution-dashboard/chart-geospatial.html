<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Chart - Geospatial</title>
<style>:root{--bg:#fafffd;--surface:#fff;--border:#aeabaf;--text:#342e37;--primary:#9fd356;--info:#3c91e6}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:var(--bg);font-family:'Nunito',sans-serif}.card{width:min(700px,95vw);background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:14px}h1{margin:0 0 10px;font:700 18px 'Fredoka One',system-ui}.map{display:grid;grid-template-columns:repeat(12,1fr);gap:4px}.tile{aspect-ratio:1;border:1px solid var(--border);border-radius:6px;background:#eef3f8}.hot{background:rgba(60,145,230,.55)}.warm{background:rgba(159,211,86,.58)}.label{margin-top:8px;font-size:12px;color:var(--text)}</style></head>
<body><section class="card"><h1>Geospatial Tile Demo</h1><div class="map"><div class="tile"></div><div class="tile"></div><div class="tile warm"></div><div class="tile warm"></div><div class="tile"></div><div class="tile"></div><div class="tile"></div><div class="tile"></div><div class="tile"></div><div class="tile"></div><div class="tile"></div><div class="tile"></div><div class="tile"></div><div class="tile hot"></div><div class="tile hot"></div><div class="tile warm"></div><div class="tile"></div><div class="tile"></div><div class="tile"></div><div class="tile warm"></div><div class="tile warm"></div><div class="tile"></div><div class="tile"></div><div class="tile"></div><div class="tile"></div><div class="tile hot"></div><div class="tile hot"></div><div class="tile warm"></div><div class="tile"></div><div class="tile"></div><div class="tile"></div><div class="tile warm"></div><div class="tile hot"></div><div class="tile warm"></div><div class="tile"></div><div class="tile"></div><div class="tile"></div><div class="tile"></div><div class="tile warm"></div><div class="tile"></div><div class="tile"></div><div class="tile"></div><div class="tile"></div><div class="tile"></div><div class="tile warm"></div><div class="tile"></div><div class="tile"></div><div class="tile"></div></div><p class="label">Heatmap-like geospatial placeholder for regional activity intensity.</p></section></body></html>
