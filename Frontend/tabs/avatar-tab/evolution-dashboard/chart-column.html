<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Chart - Column</title>
<style>:root{--bg:#fafffd;--surface:#fff;--border:#aeabaf;--text:#342e37;--primary:#9fd356;--info:#3c91e6}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:var(--bg);font-family:'Nunito',sans-serif}.card{width:min(640px,94vw);background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:14px}h1{margin:0 0 10px;font:700 18px 'Fredoka One',system-ui}svg{width:100%;height:auto}.axis{stroke:var(--border)}.bar{fill:var(--primary)}.bar.alt{fill:var(--info)}text{fill:var(--text);font:700 10px 'Nunito',sans-serif}</style></head>
