<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Chart - Pie</title>
<style>:root{--bg:#fafffd;--surface:#fff;--border:#aeabaf;--text:#342e37;--primary:#9fd356;--info:#3c91e6;--warning:#ff9600}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:var(--bg);font-family:'Nunito',sans-serif}.card{width:min(640px,94vw);background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:14px}h1{margin:0 0 10px;font:700 18px 'Fredoka One',system-ui}.row{display:flex;gap:16px;align-items:center;flex-wrap:wrap}.legend{display:grid;gap:8px}.item{display:flex;align-items:center;gap:8px;font-size:12px}.dot{width:10px;height:10px;border-radius:50%}</style></head>
<body><section class="card"><h1>Pie Chart Demo</h1><div class="row"><svg viewBox="0 0 220 220" width="220" height="220" aria-label="Pie"><circle cx="110" cy="110" r="86" fill="#e9f2db"></circle><path d="M110 110 L110 24 A86 86 0 0 1 190 136 Z" fill="var(--info)"></path><path d="M110 110 L190 136 A86 86 0 0 1 84 192 Z" fill="var(--warning)"></path><path d="M110 110 L84 192 A86 86 0 0 1 110 24 Z" fill="var(--primary)"></path></svg><div class="legend"><div class="item"><span class="dot" style="background:var(--primary)"></span>Habits 45%</div><div class="item"><span class="dot" style="background:var(--info)"></span>Skills 30%</div><div class="item"><span class="dot" style="background:var(--warning)"></span>Output 25%</div></div></div></section></body></html>
