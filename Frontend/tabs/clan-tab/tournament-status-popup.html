<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Tournament Status Popup</title><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;800&display=swap" rel="stylesheet"><style>*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:#1e1a21;font-family:'Fredoka One',sans-serif}.popup{width:min(380px,94vw);background:linear-gradient(160deg,#ffef38,#ffd447);border-radius:24px;padding:16px;border:1px solid rgba(52,46,55,.2);color:#342e37}.close{width:32px;height:32px;border-radius:10px;background:rgba(255,255,255,.5);display:grid;place-items:center;cursor:pointer}.head{display:flex;justify-content:space-between;align-items:flex-start}.title{font-size:22px;line-height:1.15;max-width:240px}.badge{margin:10px auto 8px;width:92px;height:92px;border-radius:20px;background:#fff6a4;display:grid;place-items:center;font-size:30px}.sub{font:800 12px 'Nunito',sans-serif;text-transform:uppercase;letter-spacing:1px;text-align:center;margin-bottom:12px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.cell{background:rgba(255,255,255,.55);border:1px solid rgba(52,46,55,.18);border-radius:14px;padding:10px;display:flex;gap:8px;align-items:center}.cell img{width:22px;height:22px}.v{font-size:16px}.l{font:700 11px 'Nunito',sans-serif;color:#5d585f}</style></head><body><div class="popup"><div class="head"><div class="title">You won the Gold tournament</div><div class="close" onclick="alert('Close demo')">X</div></div><div class="badge">WIN</div><div class="sub">Winner status popup</div><div class="grid"><div class="cell"><img src="../../../assets/other-ui-elements/quests-experience-points.svg" alt="xp"><div><div class="v">1,240</div><div class="l">XP Earned</div></div></div><div class="cell"><img src="../../../assets/other-ui-elements/clock-icon-colored.svg" alt="minutes"><div><div class="v">138</div><div class="l">Minutes Recording</div></div></div><div class="cell"><img src="../../../assets/other-ui-elements/quests-experience-points.svg" alt="words"><div><div class="v">24.6k</div><div class="l">Words Said</div></div></div><div class="cell"><img src="../../../assets/other-ui-elements/clapper-board.svg" alt="videos"><div><div class="v">17</div><div class="l">Total Videos</div></div></div></div></div></body></html>
