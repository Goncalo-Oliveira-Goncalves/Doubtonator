<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Badge Display — Doubtonator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#342e37; --surface:#3e3842; --surface-2:#4a4450; --text:#fafffd; --text-sec:#858287;
      /* Badge tier colors */
      --bronze:#e6ae7e; --silver:#e1f0ff; --gold:#ffef38;
      --sapphire:#43c3fe; --ruby:#fe4c4c; --emerald:#87df05;
      --amethyst:#cf81ff; --pearl:#feaade; --obsidian:#28282c; --diamond:#87e9ea;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body { background:var(--bg); min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:40px; padding:40px 24px; font-family:'Fredoka One',sans-serif; color:var(--text); }
    .eyebrow { font-family:'Nunito',sans-serif; font-weight:800; font-size:11px; letter-spacing:2.5px; text-transform:uppercase; color:#9fd356; opacity:.8; }
    .sec-lbl { font-family:'Nunito',sans-serif; font-weight:800; font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--text-sec); opacity:.4; }

    /* ── Badge strip ─────────────────────────────────────────────────────── */
    .strip-wrap {
      width:360px; overflow:hidden; position:relative;
    }
    .strip-wrap::after {
      content:''; position:absolute; inset:0; pointer-events:none;
      background:linear-gradient(to right, var(--bg) 0%, transparent 22%, transparent 78%, var(--bg) 100%);
      z-index:2;
    }
    .strip { display:flex; align-items:center; justify-content:center; gap:10px; padding:20px 4px; }

    /* Badge */
    .badge { display:flex; flex-direction:column; align-items:center; gap:6px; flex-shrink:0; }
    .badge-icon { position:relative; }
    .badge-icon svg { display:block; }
    .badge-lbl { font-family:'Nunito',sans-serif; font-weight:800; font-size:9px; letter-spacing:1.5px; text-transform:uppercase; opacity:.55; }
    .badge.current .badge-lbl { opacity:.85; color:inherit; }

    /* Shine overlay on badge icons */
    .badge-shine { position:absolute; inset:0; border-radius:inherit; background:linear-gradient(140deg,rgba(255,255,255,.28) 0%,transparent 55%); pointer-events:none; }

    /* Locked */
    .badge.locked .badge-icon { opacity:.35; filter:saturate(0); }
    .badge.locked .badge-lbl { opacity:.2; }

    /* ── All badge scenarios demo ────────────────────────────────────────── */
    .demos { display:flex; flex-direction:column; gap:24px; align-items:center; }
    .demo-row { display:flex; align-items:center; gap:16px; }
    .demo-lbl { font-family:'Nunito',sans-serif; font-size:11px; color:var(--text-sec); width:60px; text-align:right; }
  </style>
</head>
<body>

<span class="eyebrow">Component · Tournaments</span>

<!-- MAIN DEMO: User is Gold (Bronze + Silver unlocked, Gold active, rest locked) -->
<div class="strip-wrap">
  <div class="strip">

    <!-- Bronze — unlocked, side -->
    <div class="badge unlocked">
      <div class="badge-icon">
        <svg width="68" height="68" viewBox="0 0 68 68">
          <!-- Shape 1: Shield (flat top, rounded bottom) -->
          <path d="M8 8 L60 8 L60 44 Q60 62 34 62 Q8 62 8 44 Z" fill="var(--bronze)"/>
          <path d="M8 8 L60 8 L60 44 Q60 62 34 62 Q8 62 8 44 Z" fill="none" stroke="rgba(255,255,255,.3)" stroke-width="1.5"/>
          <path d="M8 8 L60 8 L60 44 Q60 62 34 62 Q8 62 8 44 Z" fill="url(#shine-bz)" opacity=".5"/>
          <defs><linearGradient id="shine-bz" x1="0" y1="0" x2="1" y2="1"><stop stop-color="white" stop-opacity=".3"/><stop offset="0.55" stop-color="white" stop-opacity="0"/></linearGradient></defs>
          <!-- Rank I -->
          <text x="34" y="42" text-anchor="middle" font-family="'Fredoka One'" font-size="22" fill="rgba(52,46,55,.7)">I</text>
        </svg>
      </div>
      <span class="badge-lbl" style="color:var(--bronze)">Bronze</span>
    </div>

    <!-- Silver — unlocked, side -->
    <div class="badge unlocked">
      <div class="badge-icon">
        <svg width="68" height="68" viewBox="0 0 68 68">
          <path d="M8 8 L60 8 L60 44 Q60 62 34 62 Q8 62 8 44 Z" fill="var(--silver)"/>
          <path d="M8 8 L60 8 L60 44 Q60 62 34 62 Q8 62 8 44 Z" fill="none" stroke="rgba(255,255,255,.35)" stroke-width="1.5"/>
          <path d="M8 8 L60 8 L60 44 Q60 62 34 62 Q8 62 8 44 Z" fill="url(#shine-sv)" opacity=".5"/>
          <defs><linearGradient id="shine-sv" x1="0" y1="0" x2="1" y2="1"><stop stop-color="white" stop-opacity=".4"/><stop offset="0.55" stop-color="white" stop-opacity="0"/></linearGradient></defs>
          <text x="34" y="42" text-anchor="middle" font-family="'Fredoka One'" font-size="22" fill="rgba(52,46,55,.6)">II</text>
        </svg>
      </div>
      <span class="badge-lbl" style="color:var(--silver)">Silver</span>
    </div>

    <!-- Gold — CENTER, active -->
    <div class="badge current unlocked">
      <div class="badge-icon">
        <svg width="88" height="88" viewBox="0 0 88 88">
          <path d="M10 10 L78 10 L78 57 Q78 80 44 80 Q10 80 10 57 Z" fill="var(--gold)"/>
          <path d="M10 10 L78 10 L78 57 Q78 80 44 80 Q10 80 10 57 Z" fill="none" stroke="rgba(255,255,255,.4)" stroke-width="2"/>
          <path d="M10 10 L78 10 L78 57 Q78 80 44 80 Q10 80 10 57 Z" fill="url(#shine-gd)" opacity=".6"/>
          <defs><linearGradient id="shine-gd" x1="0" y1="0" x2="1" y2="1"><stop stop-color="white" stop-opacity=".45"/><stop offset="0.55" stop-color="white" stop-opacity="0"/></linearGradient></defs>
          <!-- Particle dots -->
          <circle cx="22" cy="22" r="2.5" fill="rgba(255,255,255,.5)"/>
          <circle cx="66" cy="18" r="2" fill="rgba(255,255,255,.4)"/>
          <circle cx="74" cy="36" r="1.8" fill="rgba(255,255,255,.35)"/>
          <circle cx="14" cy="44" r="2" fill="rgba(255,255,255,.4)"/>
          <text x="44" y="55" text-anchor="middle" font-family="'Fredoka One'" font-size="28" fill="rgba(52,46,55,.75)">III</text>
        </svg>
      </div>
      <span class="badge-lbl" style="color:var(--gold)">Gold</span>
    </div>

    <!-- Sapphire — locked -->
    <div class="badge locked">
      <div class="badge-icon">
        <svg width="68" height="68" viewBox="0 0 68 68">
          <image href="../../../../assets/badges/locked-badge.svg" x="6" y="6" width="56" height="56" preserveAspectRatio="xMidYMid meet" onerror="this.style.display='none';this.nextElementSibling.style.display='block';"/>
          <g style="display:none">
            <path d="M22 6 L46 6 L62 22 L62 46 L46 62 L22 62 L6 46 L6 22 Z" fill="#4a4450"/>
            <path d="M22 6 L46 6 L62 22 L62 46 L46 62 L22 62 L6 46 L6 22 Z" fill="none" stroke="rgba(255,255,255,.1)" stroke-width="1.5"/>
            <text x="34" y="39" text-anchor="middle" font-size="18" fill="rgba(255,255,255,.2)">🔒</text>
          </g>
        </svg>
      </div>
      <span class="badge-lbl">???</span>
    </div>

    <!-- Ruby — locked -->
    <div class="badge locked">
      <div class="badge-icon">
        <svg width="68" height="68" viewBox="0 0 68 68">
          <image href="../../../../assets/badges/locked-badge.svg" x="6" y="6" width="56" height="56" preserveAspectRatio="xMidYMid meet" onerror="this.style.display='none';this.nextElementSibling.style.display='block';"/>
          <g style="display:none">
            <path d="M22 6 L46 6 L62 22 L62 46 L46 62 L22 62 L6 46 L6 22 Z" fill="#4a4450"/>
            <path d="M22 6 L46 6 L62 22 L62 46 L46 62 L22 62 L6 46 L6 22 Z" fill="none" stroke="rgba(255,255,255,.1)" stroke-width="1.5"/>
            <text x="34" y="39" text-anchor="middle" font-size="18" fill="rgba(255,255,255,.2)">🔒</text>
          </g>
        </svg>
      </div>
      <span class="badge-lbl">???</span>
    </div>

  </div>
</div>


</body>
</html>
