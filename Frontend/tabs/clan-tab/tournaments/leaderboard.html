<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Leaderboard</title><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;800&display=swap" rel="stylesheet"><style>:root{--bg:#342e37;--surface:#3e3842;--text:#fafffd;--text-sec:#858287;--primary:#9fd356;--danger:#e63c3c;--border:rgba(255,255,255,.08)}*{box-sizing:border-box}body{margin:0;background:#1e1a21;min-height:100vh;display:grid;place-items:center;color:var(--text);font-family:'Fredoka One',sans-serif}.phone{width:min(390px,95vw);background:var(--bg);border:1px solid var(--border);border-radius:24px;padding:16px}.row{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border-radius:12px;background:var(--surface);margin-bottom:8px}.l{display:flex;align-items:center;gap:8px}.rk{width:28px;text-align:center}.av{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#3c91e6,#9fd356)}.name{font:700 12px 'Nunito',sans-serif}.xp{font:800 11px 'Nunito',sans-serif;color:var(--text-sec)}.zone{font:800 10px 'Nunito',sans-serif;letter-spacing:1px;text-transform:uppercase;text-align:center;margin:10px 0}.z-up{color:var(--primary)}.z-down{color:var(--danger)}.me{background:rgba(159,211,86,.15);border:1px solid rgba(159,211,86,.35)}.skeleton .row:nth-child(1){opacity:1}.skeleton .row:nth-child(2){opacity:.85}.skeleton .row:nth-child(3){opacity:.7}.skeleton .row:nth-child(4){opacity:.55}.skeleton .row:nth-child(5){opacity:.4}.skeleton .row:nth-child(6){opacity:.25}.skeleton .row:nth-child(7){opacity:.1}.toggle{display:flex;gap:8px;margin-bottom:10px}.btn{border:1px solid var(--border);background:var(--surface);color:var(--text-sec);border-radius:9px;padding:7px 10px;cursor:pointer;font:800 10px 'Nunito',sans-serif}.btn.active{color:var(--primary);background:rgba(159,211,86,.12)}</style></head><body><div class="phone"><div class="toggle"><button class="btn active" data-mode="live">Live</button><button class="btn" data-mode="skeleton">Skeleton</button></div><div id="live"><div class="zone z-up">Promotion Zone</div><div class="row"><div class="l"><div class="rk">#1</div><div class="av"></div><div class="name">Marcus A.</div></div><div class="xp">1240 XP</div></div><div class="row"><div class="l"><div class="rk">#2</div><div class="av"></div><div class="name">Sofia R.</div></div><div class="xp">1180 XP</div></div><div class="row me"><div class="l"><div class="rk">#3</div><div class="av"></div><div class="name">You</div></div><div class="xp">1110 XP</div></div><div class="row"><div class="l"><div class="rk">#4</div><div class="av"></div><div class="name">Jamie K.</div></div><div class="xp">950 XP</div></div><div class="zone z-down">Demotion Zone</div><div class="row"><div class="l"><div class="rk">#16</div><div class="av"></div><div class="name">Nina P.</div></div><div class="xp">210 XP</div></div></div><div id="skeleton" class="skeleton" hidden><div class="row"><div class="l"><div class="rk">-</div><div class="av"></div><div class="name">Unknown player</div></div><div class="xp">XP</div></div><div class="row"><div class="l"><div class="rk">-</div><div class="av"></div><div class="name">Unknown player</div></div><div class="xp">XP</div></div><div class="row"><div class="l"><div class="rk">-</div><div class="av"></div><div class="name">Unknown player</div></div><div class="xp">XP</div></div><div class="row"><div class="l"><div class="rk">-</div><div class="av"></div><div class="name">Unknown player</div></div><div class="xp">XP</div></div><div class="row"><div class="l"><div class="rk">-</div><div class="av"></div><div class="name">Unknown player</div></div><div class="xp">XP</div></div><div class="row"><div class="l"><div class="rk">-</div><div class="av"></div><div class="name">Unknown player</div></div><div class="xp">XP</div></div><div class="row"><div class="l"><div class="rk">-</div><div class="av"></div><div class="name">Unknown player</div></div><div class="xp">XP</div></div><div class="row me"><div class="l"><div class="rk">-</div><div class="av"></div><div class="name">You</div></div><div class="xp">XP</div></div></div></div><script>const btns=document.querySelectorAll('.btn');const live=document.getElementById('live');const sk=document.getElementById('skeleton');btns.forEach(b=>b.addEventListener('click',()=>{btns.forEach(x=>x.classList.remove('active'));b.classList.add('active');const s=b.dataset.mode==='skeleton';sk.hidden=!s;live.hidden=s;}));</script></body></html>
